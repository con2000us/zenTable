name: ocr-openvino
services:
  zentable-ocr-ov:
    build:
      context: .
      dockerfile: Dockerfile.openvino
    container_name: zentable-ocr-openvino
    ports:
      - "8011:8010"
    environment:
      OCR_HOST: "0.0.0.0"
      OCR_PORT: "8010"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
