services:
  zentable-css-api:
    build:
      context: ../..
      dockerfile: deploy/skill-fastapi/Dockerfile.css-api
    container_name: zentable-css-api
    restart: unless-stopped
    ports:
      - "${CSS_API_PORT:-8002}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  zentable-ocr-api:
    build:
      context: ../..
      dockerfile: Dockerfile.openvino
    container_name: zentable-ocr-api
    restart: unless-stopped
    ports:
      - "${OCR_API_PORT:-8001}:8010"
    environment:
      OCR_HOST: 0.0.0.0
      OCR_PORT: 8010
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
